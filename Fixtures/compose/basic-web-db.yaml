# Golden fixture: two-service stack exercising ports, named volumes,
# depends_on with a health condition, and a healthcheck.
# Try: swift run capsule compose plan -f Fixtures/compose/basic-web-db.yaml
name: demo-stack

services:
  web:
    image: docker.io/library/nginx:latest
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_PASSWORD: capsule
      # Apple container volumes expose the ext4 root's lost+found directory.
      # PostgreSQL therefore needs a data subdirectory beneath the mount point.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

volumes:
  pgdata: {}

# XcodeGen spec — the generated Capsule.xcodeproj is never committed.
#   brew install xcodegen
#   xcodegen generate --spec App/project.yml --project App
#   open App/Capsule.xcodeproj
name: Capsule
options:
  bundleIdPrefix: com.vatsalsaglani
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  CapsuleKit:
    path: ..
  SwiftArgumentParser:
    url: https://github.com/apple/swift-argument-parser.git
    from: "1.5.0"
  # SwiftTerm is App-only (P1C, S3 decision): raw-PTY spawn means no
  # CapsuleKit target ever imports it — only `TerminalHostView.swift` does.
  # Resolution needs network; `Package.resolved` + this generated project
  # are gitignored (see the repo-root note above).
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  Capsule:
    type: application
    platform: macOS
    sources:
      - path: Capsule
    dependencies:
      - package: CapsuleKit
        product: ContainerClient
      - package: CapsuleKit
        product: AppCore
      - package: CapsuleKit
        product: BuildManager
      - package: CapsuleKit
        product: TerminalKit
      - package: CapsuleKit
        product: RuntimeInstaller
      - package: CapsuleKit
        product: ComposeRuntime
      - package: CapsuleKit
        product: ProjectStore
      - package: CapsuleKit
        product: Supervisor
      - package: CapsuleKit
        product: Diagnostics
      - package: SwiftTerm
        product: SwiftTerm
      # Debug-only: backs the #if DEBUG scripted feel-prototype demo
      # (`ScriptedDemoSession`/`FeelPrototypeDemoView`). Remove alongside
      # that file once P4 polish lands (P1B B2+B3 commit note).
      - package: CapsuleKit
        product: ContainerClientTestSupport
      # Build the production CLI from the same Sources/CapsuleCLI frontend as
      # `swift run capsule`, then copy/sign it as nested code. Contents/MacOS
      # is intentionally avoided: `Capsule` and `capsule` collide on the
      # default case-insensitive macOS filesystem.
      - target: CapsuleCommand
        embed: true
        link: false
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Helpers
    scheme:
      testTargets: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vatsalsaglani.capsule
        MARKETING_VERSION: "0.1.3"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Capsule/Info.plist
        # Full SemVer identity, including a beta/RC suffix. Apple's
        # CFBundleShortVersionString remains numeric-only.
        CAPSULE_RELEASE_VERSION: "0.1.3-beta"
        # Brand assets live in App/Capsule/Assets.xcassets (AppIcon +
        # MenuBarIcon template mark), picked up automatically as a resource.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        # Deliberately NOT sandboxed: the app execs the `container` CLI and
        # talks to its XPC services, which App Sandbox breaks. Distribution is
        # Developer ID + notarization, not the Mac App Store.

  CapsuleCommand:
    type: tool
    platform: macOS
    sources:
      - path: ../Sources/CapsuleCLI
    dependencies:
      - package: SwiftArgumentParser
        product: ArgumentParser
      - package: CapsuleKit
        product: ContainerClient
      - package: CapsuleKit
        product: ComposeSpec
      - package: CapsuleKit
        product: ComposePlanner
      - package: CapsuleKit
        product: ComposeRuntime
      - package: CapsuleKit
        product: ProjectStore
      - package: CapsuleKit
        product: Diagnostics
      - package: CapsuleKit
        product: BuildManager
    settings:
      base:
        PRODUCT_NAME: capsule
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES

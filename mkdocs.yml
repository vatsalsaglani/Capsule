site_name: Capsule
site_description: Native macOS container management and Compose orchestration for Apple container.
site_url: https://vatsalsaglani.github.io/Capsule/
repo_url: https://github.com/vatsalsaglani/Capsule
repo_name: vatsalsaglani/Capsule
edit_uri: edit/main/docs/
copyright: Capsule is Apache-2.0 licensed.

theme:
  name: material
  logo: assets/capsule-icon.png
  favicon: assets/capsule-icon.png
  font: false
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Use dark appearance
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Use light appearance
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

nav:
  - Home: index.md
  - Get started: getting-started.md
  - CLI reference: CLI.md

# Release operations, product planning, architecture, learnings, and spike
# records stay in the repository as maintainer sources of truth, but are not
# part of the public user documentation site.
exclude_docs: |
  ROADMAP.md
  learnings/
  plans/
  releases.md
  spikes/

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vatsalsaglani/Capsule
      name: Capsule on GitHub

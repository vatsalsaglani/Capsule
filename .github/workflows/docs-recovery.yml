name: Recover release documentation

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Published release branch (for example, release/v0.1.2-beta)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: docs-recovery-${{ inputs.release_branch }}
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Resolve published release
        id: release
        shell: bash
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_BRANCH" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "'$RELEASE_BRANCH' must be release/v<major>.<minor>.<patch>[-prerelease]." >&2
            exit 1
          fi
          echo "tag=${RELEASE_BRANCH#release/}" >> "$GITHUB_OUTPUT"

      - name: Check out released source
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Capsule docs
        run: |
          python -m pip install --requirement requirements-docs.txt
          mkdocs build --strict

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-docs:
    name: Publish documentation
    needs: build-docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

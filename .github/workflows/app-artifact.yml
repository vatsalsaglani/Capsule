name: App Artifact

# Builds the Capsule.app bundle and uploads it as a downloadable workflow
# artifact so people can try the app before there's a notarized dmg (Phase 4).
# The app is ad-hoc signed, not Developer ID signed or notarized. The README
# documents the one-time quarantine removal a downloader uses to open it.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-artifact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-app:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec App/project.yml --project App

      - name: Build Capsule.app (Release, ad-hoc packaging input)
        run: |
          set -euo pipefail
          xcodebuild \
            -project App/Capsule.xcodeproj \
            -scheme Capsule \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Locate + verify embedded CLI + ad-hoc sign the app
        id: pkg
        run: |
          set -euo pipefail
          APP="$(find build/Build/Products -maxdepth 2 -name 'Capsule.app' -type d | head -1)"
          test -n "$APP" || { echo "Capsule.app not found"; exit 1; }
          echo "Built: $APP"
          CLI="$APP/Contents/Helpers/capsule"
          test -x "$CLI" || { echo "Embedded capsule CLI missing or not executable"; exit 1; }
          PRODUCT_VERSION="$(<VERSION)"
          MARKETING_VERSION="${PRODUCT_VERSION%%-*}"
          test "$("$CLI" --version)" = "$PRODUCT_VERSION"
          test "$(plutil -extract CapsuleReleaseVersion raw "$APP/Contents/Info.plist")" = "$PRODUCT_VERSION"
          test "$(plutil -extract CFBundleShortVersionString raw "$APP/Contents/Info.plist")" = "$MARKETING_VERSION"
          "$CLI" --help >/dev/null
          # Ad-hoc sign so the bundle has a stable (self-)signature; downloaders
          # still strip quarantine per the README. This is NOT notarization.
          codesign --force --deep --sign - "$APP"
          codesign --verify --strict --verbose=2 "$CLI"
          codesign --verify --deep --strict --verbose=2 "$APP"
          # ditto -k preserves the bundle + signature inside the zip.
          ditto -c -k --sequesterRsrc --keepParent "$APP" Capsule.app.zip
          echo "zip=Capsule.app.zip" >> "$GITHUB_OUTPUT"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Capsule.app-${{ github.sha }}
          path: ${{ steps.pkg.outputs.zip }}
          if-no-files-found: error

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pure logic — fast and reliable. Integration tests against a real
  # `container` runtime need a self-hosted Apple-silicon runner (plan §7)
  # and are deliberately not attempted here.
  package:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Swift version
        run: swift --version
      - name: Verify release version stamping
        run: scripts/test-release-versioning.sh
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  app:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate --spec App/project.yml --project App
      - name: Build app
        run: >
          xcodebuild -project App/Capsule.xcodeproj -scheme Capsule
          -configuration Debug build CODE_SIGNING_ALLOWED=NO

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Build documentation
        run: |
          python -m pip install --requirement requirements-docs.txt
          mkdocs build --strict
